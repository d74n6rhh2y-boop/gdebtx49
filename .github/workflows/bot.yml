name: hexplay pick bot

on:
  schedule:
    - cron: '0 18 * * *'      # every day at 18:00 UTC (bot.py skips rest days: 5/10/15/20/25/30)
  workflow_dispatch:           # manual "Run workflow" button
    inputs:
      dry_run:
        description: 'Print the post only, do not send'
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write            # to commit post history (bot_state.json)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests tweepy atproto
      - run: python bot.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL:   ${{ secrets.TELEGRAM_CHANNEL }}
          BLUESKY_HANDLE:       ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          X_API_KEY:          ${{ secrets.X_API_KEY }}
          X_API_SECRET:       ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:     ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:    ${{ secrets.X_ACCESS_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          EVENT:   ${{ github.event_name }}

      - name: Persist post history
        if: always()             # commit even if one platform failed after a successful post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot_state.json || true
          git diff --cached --quiet && echo "no changes" || {
            git commit -m "bot: update post history"
            git pull --rebase --autostash || true
            git push || true
          }
