const HXPOS = 'hxpos';
function hxKey() { return JSON.stringify([scope, selTags.slice().sort(), [...plats].sort(), query, sortDir]); }
function hxSave() {
try { sessionStorage.setItem(HXPOS, JSON.stringify({ k: hxKey(), shown: shown, y: Math.round(window.scrollY) })); } catch (e) {}
}
let hxST = 0;
window.addEventListener('scroll', () => { const n = Date.now(); if (n - hxST > 250) { hxST = n; hxSave(); } }, { passive: true });
window.addEventListener('pagehide', hxSave);
function hxRestore() {
try {
if (history.scrollRestoration) history.scrollRestoration = 'manual';
const s = JSON.parse(sessionStorage.getItem(HXPOS) || 'null');
if (!s || s.k !== hxKey() || !(s.shown > PAGE_STEP || s.y > 60)) return;
shown = Math.max(PAGE_STEP, s.shown | 0);
render();
requestAnimationFrame(() => window.scrollTo(0, s.y | 0));
} catch (e) {}
}

function glitchPool() {
const out = [];
const BTN = '.nav-btn,.filter-btn,#lucky,.tag,#loadMoreBtn,.sharebar button,.copyt,.seltag,.jump button';
document.querySelectorAll('.page *').forEach(el => {
if (el.matches('script,style,br,.bg,svg *,.flex-filler')) return;
if (el.matches(BTN)) { out.push(el); return; }
if (el.closest(BTN)) return;
if (el.matches('.w,.logo,img,svg')) { out.push(el); return; }
const kids = el.children;
if (!kids.length) { if (el.textContent.trim()) out.push(el); return; }
});
return out;
}
function glitchTick() {
if (!glitchCache) glitchCache = glitchPool();
const vh = window.innerHeight;
const vis = glitchCache.filter(el => { const r = el.getBoundingClientRect(); return r.bottom > 0 && r.top < vh && r.width > 0; });
const n = Math.min(1, vis.length);
for (let i = 0; i < n; i++) {
const el = vis[Math.floor(Math.random() * vis.length)];
if (!el || el.classList.contains('zap')) continue;
el.classList.add('zap');
setTimeout(() => el.classList.remove('zap'), 350 + Math.random() * 250);
}
setTimeout(glitchTick, 7000 + Math.random() * 7000);
}
idle(() => setTimeout(glitchTick, 600));
